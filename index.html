<div class="module">
    <h4>📑 Persistent Research Log</h4>
    <p style="font-size: 10px; color: #7f8c8d;">Data is cached locally. Use 'Generate Archive Link' to save notes across URLs.</p>
    
    <textarea id="researchNotes" class="admin-input" placeholder="Enter findings..."></textarea>
    
    <div style="display: flex; gap: 5px;">
        <button class="action-btn btn-update" onclick="saveToMemory()">SAVE TO NODE</button>
        <button class="action-btn" style="background:#546e7a; color:white;" onclick="generateShareLink()">GENERATE ARCHIVE LINK</button>
    </div>
    
    <p id="logStatus" style="font-size:9px; color:#27ae60; margin-top:5px;"></p>
</div>

<script>
// 1. SAVE TO THE COMPUTER (LocalStorage)
function saveToMemory() {
    const text = document.getElementById('researchNotes').value;
    localStorage.setItem('lab_notes', text);
    document.getElementById('logStatus').innerText = "✓ Saved to Local Memory";
}

// 2. MAKE A LINK THAT HAS THE TEXT INSIDE IT
function generateShareLink() {
    const text = document.getElementById('researchNotes').value;
    const encodedText = btoa(text); // Turns text into a code
    const newUrl = window.location.origin + window.location.pathname + "?data=" + encodedText;
    
    // Copy the new URL to your clipboard
    navigator.clipboard.writeText(newUrl);
    alert("Archive Link Copied! Save this URL to see your notes anywhere.");
}

// 3. LOAD DATA WHEN SITE OPENS
window.onload = function() {
    // Check if there is data in the URL first
    const urlParams = new URLSearchParams(window.location.search);
    const urlData = urlParams.get('data');

    if (urlData) {
        document.getElementById('researchNotes').value = atob(urlData); // Decode URL data
    } else {
        // Otherwise, check the computer's local memory
        const localData = localStorage.getItem('lab_notes');
        if (localData) document.getElementById('researchNotes').value = localData;
    }
    
    // Also run your NASA fetch
    if(typeof fetchNasa === 'function') fetchNasa();
};
</script>
